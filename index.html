<!doctype html>
<html>
  <head>
    <script>
      // 在页面渲染前就执行主题初始化
      try {
        const storageKey = "vite-ui-theme"
        let theme = localStorage.getItem(storageKey)
        if (theme === "system" || !theme) {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
        }
        document.documentElement.classList.add(theme)
      } catch (_e) {
        document.documentElement.classList.add("light")
      }
    </script>
    <style>
      /* Prevent FOUC in Safari */
      html:not(.light):not(.dark) * {
        visibility: hidden;
      }

      :root {
        color-scheme: light;
        --bg: #F8F7F6;
      }

      html.light {
        color-scheme: light;
        --bg: #F8F7F6;
      }

      html.dark {
        color-scheme: dark;
        --bg: #141414;
      }

      html {
        background: transparent !important;
      }

      body {
        background: transparent !important;
      }

      #root {
        background: transparent !important;
        visibility: hidden;
      }

      #root.loaded {
        visibility: visible;
        animation: fadein 0.2s;
      }

      @keyframes fadein {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
    <script>
      ;(() => {
        const storageKey = "vite-ui-theme"
        const theme = localStorage.getItem(storageKey) || "system"
        const root = document.documentElement
        if (theme === "system" || theme === "light") {
          root.classList.remove("dark")
          root.classList.add("light")
        }
        document.querySelector('meta[name="theme-color"]')?.setAttribute("content", "#F8F7F6")

        // Add loaded class after React has mounted
        window.addEventListener("load", () => {
          const root = document.getElementById("root")
          if (root) {
            // 使用 RAF 确保在下一帧渲染
            requestAnimationFrame(() => {
              requestAnimationFrame(() => {
                root.classList.add("loaded")
              })
            })
          }
        })
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CZL Server</title>

    <link rel="stylesheet" href="https://i.czl.net/jsdelivr/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://i.czl.net/jsdelivr/npm/font-logos@1/assets/font-logos.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
